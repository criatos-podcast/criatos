<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criatos | O teu DNA é Criativo!</title>
    <style>
        /* =========================================
           PALETA DE CORES & VARIÁVEIS
           ========================================= */
        :root {
            --purple: #5E2CA5;
            --purple-dark: #3b1b69;
            --yellow: #F2B804;
            --yellow-glow: rgba(242, 184, 4, 0.4);
            --beige: #D1CEBF;
            --dark: #0a0a0a;
            --glass-bg: rgba(209, 206, 191, 0.03);
            --glass-border: rgba(209, 206, 191, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark);
            color: var(--beige);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* =========================================
           BACKGROUND DINÂMICO NATIVO HTML5 CANVAS
           ========================================= */
        #interactive-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* =========================================
           CONTEÚDO PRINCIPAL
           ========================================= */
        main {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PERFIL PREMIUM --- */
        .profile-container {
            margin-bottom: 2.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .avatar-ring {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--yellow), var(--purple));
            padding: 4px;
            box-shadow: 0 10px 40px rgba(242, 184, 4, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar-ring:hover {
            transform: scale(1.08);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--dark);
            overflow: hidden;
            position: relative;
            border: 3px solid var(--dark);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .eyebrow {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--yellow);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        p.bio {
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--beige);
            opacity: 0.85;
            line-height: 1.6;
            padding: 0 1rem;
        }

        /* =========================================
           CARTÕES GLASSMORPHISM (PODCASTS)
           ========================================= */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 1.1rem 1.5rem;
            text-decoration: none;
            color: var(--beige);
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 20px;
            
            /* Efeito Vidro Fosco */
            background: linear-gradient(135deg, rgba(209, 206, 191, 0.08), rgba(209, 206, 191, 0.01));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            
            /* Refração da luz nas bordas */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.4);
            
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .link-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-20deg);
            transition: 0.6s ease;
        }

        .link-card:hover::after {
            left: 150%;
        }

        .link-card:hover, .link-card:focus {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(209, 206, 191, 0.12), rgba(209, 206, 191, 0.03));
            border-color: var(--yellow);
            color: var(--yellow);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 25px rgba(242, 184, 4, 0.15);
            outline: none;
        }

        .icon-container {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.2rem;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .icon-container svg {
            width: 24px;
            height: 24px;
            fill: var(--beige);
            transition: all 0.4s ease;
        }

        .link-card:hover .icon-container {
            background: var(--yellow-glow);
            border-color: var(--yellow);
        }

        .link-card:hover .icon-container svg {
            fill: var(--dark);
            transform: scale(1.15);
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
            letter-spacing: 0.3px;
        }

        .arrow {
            opacity: 0.2;
            transition: all 0.3s ease;
        }
        
        .link-card:hover .arrow {
            opacity: 1;
            transform: translateX(5px);
            fill: var(--yellow);
        }

        /* =========================================
           REDES SOCIAIS (BOTÕES CIRCULARES)
           ========================================= */
        .social-wrapper {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            width: 100%;
        }

        .social-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            text-decoration: none;
            border-radius: 50%;
            
            background: linear-gradient(135deg, rgba(209, 206, 191, 0.08), rgba(209, 206, 191, 0.01));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.4);
            
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .social-card svg {
            width: 24px;
            height: 24px;
            fill: var(--beige);
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .social-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(242,184,4,0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .social-card:hover, .social-card:focus {
            transform: translateY(-5px);
            border-color: var(--yellow);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 25px rgba(242, 184, 4, 0.15);
        }

        .social-card:hover::after {
            opacity: 1;
        }

        .social-card:hover svg {
            fill: var(--yellow);
            transform: scale(1.15);
        }

        footer {
            margin-top: 4rem;
            position: relative;
            z-index: 2;
            font-size: 0.85rem;
            color: var(--beige);
            opacity: 0.5;
            text-align: center;
        }

    </style>
</head>

    <!-- SCRIPT DO FUNDO DINÂMICO NATIVO HTML5 -->
    <script>
        const canvas = document.getElementById('interactive-bg');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let pointer = { 
            x: window.innerWidth / 2, y: window.innerHeight / 2, 
            tx: window.innerWidth / 2, ty: window.innerHeight / 2 
        };

        const colorPurple = { r: 94, g: 44, b: 165 };
        const colorYellow = { r: 242, g: 184, b: 4 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            pointer.tx = e.clientX;
            pointer.ty = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            pointer.tx = e.touches[0].clientX;
            pointer.ty = e.touches[0].clientY;
        }, { passive: true });

        let time = 0;

        function animate() {
            time += 0.003; 

            // Movimento suave
            pointer.x += (pointer.tx - pointer.x) * 0.05;
            pointer.y += (pointer.ty - pointer.y) * 0.05;

            // Fundo profundo
            ctx.fillStyle = '#0a0a0a'; 
            ctx.fillRect(0, 0, width, height);

            // 1. Luz Roxa Autônoma
            let rx = width / 2 + Math.cos(time) * (width * 0.3);
            let ry = height / 2 + Math.sin(time * 0.7) * (height * 0.4);
            
            let radiusPurple = Math.max(width, height) * 0.7; 
            let grad1 = ctx.createRadialGradient(rx, ry, 0, rx, ry, radiusPurple);
            grad1.addColorStop(0, `rgba(${colorPurple.r}, ${colorPurple.g}, ${colorPurple.b}, 0.5)`);
            grad1.addColorStop(1, 'rgba(10, 10, 10, 0)');
            
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, width, height);

            // 2. Luz Amarela que segue o cursor
            let radiusYellow = Math.min(width, height) * 0.5; 
            let grad2 = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, radiusYellow);
            grad2.addColorStop(0, `rgba(${colorYellow.r}, ${colorYellow.g}, ${colorYellow.b}, 0.12)`); 
            grad2.addColorStop(0.5, `rgba(${colorYellow.r}, ${colorYellow.g}, ${colorYellow.b}, 0.05)`);
            grad2.addColorStop(1, 'rgba(10, 10, 10, 0)');
            
            ctx.fillStyle = grad2;
            
            ctx.globalCompositeOperation = 'screen'; 
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'source-over'; 

            requestAnimationFrame(animate);
        }
        animate(); 
    </script>

    <!-- SCRIPT DE RASTREIO DE CLIQUES -->
    <script>
        // O LINK NOVO GERADO PELO GOOGLE VAI AQUI DENTRO (COM AS ASPAS):
        const GOOGLE_SCRIPT_URL = "SUA_URL_AQUI"; 

        document.querySelectorAll('.click-tracker').forEach(link => {
            link.addEventListener('click', function(e) {
                const linkName = this.getAttribute('data-link');
                
                if(GOOGLE_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbzAhUVu0n6Hqc4FTBltZ_VKz8TtwDchbhjq29ZiekyCw9CwEmZPmUlyalp2zOq4Eb9AVQ/exec") {
                    console.warn(`[Modo de Teste] O clique em ${linkName} não foi gravado no Google porque falta a URL.`);
                    return;
                }

                // Envio silencioso dos dados
                fetch(`${GOOGLE_SCRIPT_URL}?link=${encodeURIComponent(linkName)}`, {
                    method: 'GET',
                    mode: 'no-cors' 
                }).catch(err => console.log('Erro ao registar clique', err));
            });
        });
    </script>
